<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAMSE Docs — Assistant IA</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #f5f5f5; height: 100vh; display: flex; flex-direction: column; }
  header { background: #1a3c5e; color: white; padding: 16px 24px; display: flex; align-items: center; gap: 12px; }
  header h1 { font-size: 18px; font-weight: 600; }
  header span { font-size: 12px; opacity: 0.7; }
  #chat { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 16px; }
  .msg { max-width: 75%; padding: 12px 16px; border-radius: 12px; font-size: 14px; line-height: 1.5; }
  .user { align-self: flex-end; background: #1a3c5e; color: white; border-bottom-right-radius: 4px; }
  .assistant { align-self: flex-start; background: white; color: #222; border: 1px solid #e0e0e0; border-bottom-left-radius: 4px; }
  .sources { margin-top: 8px; font-size: 11px; color: #888; border-top: 1px solid #f0f0f0; padding-top: 6px; }
  .thinking { opacity: 0.5; font-style: italic; }
  footer { background: white; border-top: 1px solid #e0e0e0; padding: 16px 24px; display: flex; gap: 12px; }
  #input { flex: 1; padding: 10px 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; outline: none; }
  #input:focus { border-color: #1a3c5e; }
  button { background: #1a3c5e; color: white; border: none; padding: 10px 20px; border-radius: 8px; font-size: 14px; cursor: pointer; }
  button:hover { background: #15304f; }
  button:disabled { opacity: 0.5; cursor: default; }
  #ingest-btn { background: #2d7a4f; font-size: 12px; padding: 8px 14px; }
  #ingest-btn:hover { background: #256040; }
  #status { font-size: 12px; color: #666; padding: 4px 0; }
</style>
</head>
<body>
<header>
  <div>
    <h1>Assistant Documents SAMSE</h1>
    <span>Posez vos questions sur le catalogue, les procédures et les contrats</span>
  </div>
  <div style="margin-left:auto;display:flex;gap:8px;align-items:center">
    <span id="status"></span>
    <button id="ingest-btn" onclick="ingest()">Recharger les docs</button>
  </div>
</header>
<div id="chat"></div>
<footer>
  <input id="input" type="text" placeholder="Ex: Quel est le prix de la laine de verre 100mm ?" onkeydown="if(event.key==='Enter')send()">
  <button id="send-btn" onclick="send()">Envoyer</button>
</footer>

<script>
const chat = document.getElementById('chat');
const input = document.getElementById('input');
const sendBtn = document.getElementById('send-btn');
const status = document.getElementById('status');

function addMsg(text, role, sources) {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  if (sources && sources.length) {
    const s = document.createElement('div');
    s.className = 'sources';
    s.textContent = 'Sources : ' + sources.join(', ');
    div.appendChild(s);
  }
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

async function ingest() {
  status.textContent = 'Chargement des documents…';
  const r = await fetch('/api/ingest', { method: 'POST', headers: {'Content-Type':'application/json'}, body: '{}' });
  const d = await r.json();
  const n = d.total_chunks;
  status.textContent = `${d.ingested.length} docs chargés (${n} passages)`;
}

async function send() {
  const q = input.value.trim();
  if (!q) return;
  input.value = '';
  sendBtn.disabled = true;
  addMsg(q, 'user');
  const thinking = addMsg('Recherche en cours…', 'assistant thinking');
  try {
    const r = await fetch('/api/ask', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ question: q }),
    });
    const d = await r.json();
    thinking.remove();
    addMsg(d.answer, 'assistant', d.sources);
  } catch(e) {
    thinking.textContent = 'Erreur de connexion.';
    thinking.classList.remove('thinking');
  }
  sendBtn.disabled = false;
  input.focus();
}

// Auto-ingest au démarrage
window.addEventListener('load', ingest);
</script>
</body>
</html>
